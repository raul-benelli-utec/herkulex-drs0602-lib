[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200

; Puerto serie: si no está definido, PlatformIO detecta el puerto automáticamente.
; Si quieres fijar un puerto, descomenta y ajusta (ej. /dev/ttyACM0 o /dev/ttyUSB0):
; upload_port = /dev/ttyACM0
; monitor_port = /dev/ttyACM0

; Configuración del compilador
; Include paths relativos desde examples/proyecto_cobot/
build_flags = 
    -I../../src
    -Iconfig
    -Isrc

; Configuración de la librería
; La raíz de la librería está dos niveles arriba del ejemplo
lib_ldf_mode = chain+
lib_extra_dirs = ../..
lib_ignore =
    examples

